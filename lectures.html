<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاضرات | My College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .hero-blue { background-color: #1a3a8a; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#030712] transition-colors duration-500 min-h-screen flex flex-col">

    <nav class="bg-white dark:bg-[#0f172a] shadow-sm py-4 px-6 border-b border-slate-100 dark:border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="image/logo.png" alt="Logo" class="w-10 h-10 object-contain">
                <span class="text-2xl font-black text-[#1a3a8a] dark:text-white">My<span class="text-purple-600">College</span></span>
            </a>
            <button onclick="location.href='index.html'" class="bg-[#1a3a8a] text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                🏠 العودة للمواد
            </button>
        </div>
    </nav>

    <header class="hero-blue pt-12 pb-24 px-6 relative overflow-hidden">
        <div class="max-w-6xl mx-auto relative z-10 text-right">
            <h1 id="courseTitle" class="text-4xl md:text-6xl font-black text-white mb-4">جاري التحميل...</h1>
            <p id="courseDesc" class="text-blue-100 text-lg max-w-3xl font-medium leading-relaxed"></p>
        </div>
        <div class="absolute top-0 left-0 w-64 h-64 bg-white/5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto px-6 -mt-12 pb-20 w-full relative z-20">
        <div id="lecturesList" class="space-y-4">
            <div class="bg-white dark:bg-slate-800 p-12 rounded-3xl shadow-lg text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold">جاري جلب المحاضرات من السيرفر...</p>
            </div>
        </div>
    </main>

    <footer class="bg-[#084c61] text-white py-12 text-center mt-auto">
        <div class="max-w-4xl mx-auto px-6">
            <img src="image/logo.png" class="w-16 mx-auto mb-4 brightness-0 invert">
            <div class="bg-white text-[#084c61] inline-flex items-center gap-3 px-6 py-2 rounded-xl font-black text-xl mb-6 shadow-xl">
                <span>📞 الخط الساخن:</span>
                <span class="border-b-2 border-[#084c61]">16546</span>
            </div>
            <p class="text-slate-300 text-sm font-bold">جميع الحقوق محفوظة &copy; 2026 لمنصة My College</p>
        </div>
    </footer>

    <script>
        const apiUrl = 'https://mycollegee-api.runasp.net/api/college';
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (!courseId) {
                showError("⚠️ خطأ: لم يتم تحديد كود المادة في الرابط!");
                return;
            }
            loadCourseData();
            loadLectures();
        });

        async function loadCourseData() {
            try {
                const res = await fetch(`${apiUrl}/course-details/${courseId}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('courseTitle').innerText = `مادة: ${data.name}`;
                    document.getElementById('courseDesc').innerText = data.description || 'مرحباً بك في المحاضرات المتاحة للمادة.';
                    document.title = `${data.name} | My College`;
                }
            } catch (err) { console.error("Course info error"); }
        }

        async function loadLectures() {
            const list = document.getElementById('lecturesList');
            try {
                // جلب المحاضرات من الـ Endpoint الصحيح
                const res = await fetch(`${apiUrl}/courses/${courseId}/lectures`);
                if (!res.ok) throw new Error();
                const lectures = await res.json();

                if (lectures.length === 0) {
                    list.innerHTML = `
                        <div class="bg-white dark:bg-slate-800 p-12 rounded-3xl shadow-lg text-center border-2 border-dashed border-slate-200 dark:border-white/10">
                            <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-2">لا توجد محاضرات حالياً 😅</h3>
                            <p class="text-slate-500 dark:text-slate-400 font-bold">سيتم إضافة المحتوى التعليمي قريباً جداً.</p>
                        </div>`;
                    return;
                }

                list.innerHTML = '';
                // داخل دالة loadLectures في ملف lectures.html
lectures.forEach((lec, index) => {
    list.innerHTML += `
        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-white/5 flex justify-between items-center group hover:scale-[1.01] transition-all cursor-pointer" 
             onclick="location.href='lecture.html?id=${lec.id}'">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 text-[#1a3a8a] rounded-lg flex items-center justify-center font-black">${index + 1}</div>
                <div>
                    <h3 class="font-black text-slate-800 dark:text-white group-hover:text-blue-600 transition">${lec.name}</h3>
                    <p class="text-xs text-slate-400 font-bold mt-1">اضغط للمشاهدة الآن داخل المنصة 🎥</p>
                </div>
            </div>
            <span class="text-[#1a3a8a] font-black text-xl rtl:rotate-180">➔</span>
        </div>`;
});
            } catch (err) {
                showError("⚠️ حدث خطأ في تحميل المحاضرات");
            }
        }

        function showError(msg) {
            document.getElementById('lecturesList').innerHTML = `
                <div class="bg-red-50 dark:bg-red-900/10 p-10 rounded-3xl border border-red-100 dark:border-red-900/20 text-center">
                    <p class="text-red-600 font-black text-lg">${msg}</p>
                    <p class="text-red-400 text-sm mt-2 font-bold">تأكد من تشغيل السيرفر (Back-end) وحاول مرة أخرى.</p>
                    <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-red-500/30">إعادة المحاولة</button>
                </div>`;
        }
    </script>
</body>
</html>
